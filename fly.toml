# ─────────────────────────────────────────────────────────────────
# Fly.io deployment config — YouTube Auto Uploader
# Deploy: fly deploy
# ─────────────────────────────────────────────────────────────────

app = "autoupload"
primary_region = "sin"   # Singapore — ใกล้ Thailand ที่สุด

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV        = "production"
  PORT            = "3000"
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
  PUPPETEER_EXECUTABLE_PATH        = "/usr/bin/chromium"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = false   # ★ อย่าให้หยุดเอง — ต้องทำงาน 24/7
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory_mb = 512   # puppeteer ต้องการ RAM — upgrade เป็น 1024 ถ้า OOM

# Persistent volume สำหรับ data + downloads
[[mounts]]
  source      = "autoupload_data"
  destination = "/app/data"
  initial_size = "1gb"

[[mounts]]
  source      = "autoupload_downloads"
  destination = "/app/downloads"
  initial_size = "5gb"

[checks]
  [checks.health]
    grace_period = "20s"
    interval     = "30s"
    method       = "GET"
    path         = "/api/health"
    port         = 3000
    timeout      = "10s"
    type         = "http"
