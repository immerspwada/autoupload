<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Auto Uploader v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1>🎬 YouTube Auto Uploader</h1>
        <span class="version">v2.1</span>
      </div>
      <p class="subtitle">Queue • Scheduler • TikTok • Analytics</p>
      <div id="auth-status" class="auth-status"></div>
      <div id="channel-info" class="channel-info" style="display:none;"></div>
    </header>

    <!-- Navigation — แต่ละ tab = 1 URL path -->
    <nav class="tabs">
      <button class="tab active" data-path="/">📊 Dashboard</button>
      <button class="tab" data-path="/upload">📤 อัปโหลด</button>
      <button class="tab" data-path="/tiktok">🎵 TikTok</button>
      <button class="tab" data-path="/files">📁 ไฟล์</button>
      <button class="tab" data-path="/queue">🔄 คิว</button>
      <button class="tab" data-path="/scheduler">⏰ Scheduler</button>
      <button class="tab" data-path="/settings">⚙️ ตั้งค่า</button>
      <button class="tab" data-path="/history">📋 ประวัติ</button>
    </nav>

    <!-- Status Bar -->
    <div id="status-bar" class="status-bar">
      <div class="status-bar-item" id="sb-connection">
        <span class="sb-dot connected"></span>
        <span class="sb-text">เชื่อมต่อ</span>
      </div>
      <div class="status-bar-item" id="sb-queue">
        <span class="sb-icon">🔄</span>
        <span class="sb-text">คิวว่าง</span>
      </div>
      <div class="status-bar-item" id="sb-uptime">
        <span class="sb-icon">⏱️</span>
        <span class="sb-text">-</span>
      </div>
      <div class="status-bar-item" id="sb-health">
        <span class="sb-icon">💚</span>
        <span class="sb-text">ปกติ</span>
      </div>
      <button class="status-bar-btn" onclick="runCleanup()" title="ล้าง temp">🧹</button>
    </div>

    <!-- Page Content (loaded dynamically per route) -->
    <main id="page-content" class="page-content">
      <p class="empty-state">กำลังโหลด...</p>
    </main>
  </div>

  <!-- Upload Modal (shared across pages) -->
  <div id="upload-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>📤 อัปโหลดวิดีโอ</h3>
      <form id="upload-form">
        <input type="hidden" id="upload-filename">
        <div class="form-group">
          <label for="upload-title">ชื่อวิดีโอ</label>
          <input type="text" id="upload-title" required>
        </div>
        <div class="form-group">
          <label for="upload-description">คำอธิบาย</label>
          <textarea id="upload-description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="upload-tags">แท็ก</label>
          <input type="text" id="upload-tags" placeholder="คั่นด้วยคอมม่า">
        </div>
        <div class="form-group">
          <label for="upload-privacy">ความเป็นส่วนตัว</label>
          <select id="upload-privacy">
            <option value="public">🌐 สาธารณะ</option>
            <option value="unlisted">� ไม่แสดงในรายการ</option>
            <option value="private">🔒 ส่วนตัว</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
          <button type="submit" class="btn btn-primary">� อัปโหลด</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Keyboard Shortcuts Modal -->
  <div id="shortcuts-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>⌨️ คีย์ลัด</h3>
      <div class="shortcuts-grid">
        <div class="shortcut-item"><kbd>1</kbd>-<kbd>8</kbd> <span>สลับหน้า</span></div>
        <div class="shortcut-item"><kbd>R</kbd> <span>รีเฟรช</span></div>
        <div class="shortcut-item"><kbd>?</kbd> <span>คีย์ลัด</span></div>
        <div class="shortcut-item"><kbd>Esc</kbd> <span>ปิด</span></div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="document.getElementById('shortcuts-modal').style.display='none'">ปิด</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
